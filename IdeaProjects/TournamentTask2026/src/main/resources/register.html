<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input { display: block; margin: 5px 0; }
        button { margin-top: 10px; }
        .response { margin-top: 10px; color: green; }
        .error { color: red; }
    </style>
</head>
<body>
<h2>Register</h2>
<input type="text" id="name" placeholder="Name">
<input type="email" id="login" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<div class="response" id="response"></div>
<a href="login.html">Already have an account? Login</a>

<script>
    function register() {
        const name = document.getElementById('name').value;
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;

        fetch('http://localhost:8080/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, login, password })
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById('response').innerText = data;
            document.getElementById('response').className = 'response';
        })
        .catch(err => {
            document.getElementById('response').innerText = err;
            document.getElementById('response').className = 'error';
        });
    }
</script>
</body>
</html>
